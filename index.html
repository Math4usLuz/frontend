<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Agents - Autenticação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;1,800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at 20% 30%, #301934 0%, #0d0d1e 50%, #0b112c 100%);
            overflow-x: hidden;
        }
        .purple-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124,58,237,0.3) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -10%;
            z-index: 1;
        }
        .blue-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(59,130,246,0.25) 0%, rgba(0,0,0,0) 70%);
            bottom: -20%;
            right: -10%;
            z-index: 1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Roblox Heads em CSS */
        .roblox-head {
            width: 160px;
            height: 180px;
            border-radius: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.6);
            position: relative;
        }
        .roblox-head.player {
            background: linear-gradient(160deg, #7C3AED 0%, #5B21B6 100%);
        }
        .roblox-head.club {
            background: linear-gradient(160deg, #3B82F6 0%, #1E40AF 100%);
        }
        .roblox-face {
            width: 100%;
            height: 60%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding-bottom: 30px;
        }
        .roblox-eyes {
            display: flex;
            gap: 18px;
        }
        .roblox-eyes span {
            width: 12px;
            height: 16px;
            border-radius: 3px;
            background: #0B1220;
        }
        .roblox-head.club .roblox-eyes span {
            width: 14px;
            height: 5px;
            border-radius: 2px;
            transform: rotate(-6deg);
        }
        .roblox-head.club .roblox-eyes span:last-child {
            transform: rotate(6deg);
        }
        .roblox-label {
            text-align: center;
            margin-top: 16px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .roblox-sub {
            text-align: center;
            font-size: 0.7rem;
            color: #94A3B8;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative text-white">

    <div class="purple-glow"></div>
    <div class="blue-glow"></div>

    <div class="w-full max-w-6xl flex flex-col items-center justify-center z-10">
        
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-6xl font-black italic tracking-wider uppercase text-white drop-shadow-[0_4px_12px_rgba(255,255,255,0.1)]">
                FREE AGENTS
            </h1>
            <p class="text-gray-400 text-sm md:text-base mt-2 font-medium tracking-wide">
                Conectando jogadores ao futuro do futebol
            </p>
        </header>

        <div class="w-full flex flex-col lg:flex-row items-center justify-between gap-8 lg:gap-0 px-4">
            
            <!-- Personagem Esquerda - Jogador -->
            <div class="flex flex-col items-center order-2 lg:order-1 transform hover:scale-105 transition-transform duration-300">
                <div class="roblox-head player">
                    <div class="roblox-face">
                        <div class="roblox-eyes">
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
                <p class="roblox-label">Jogador</p>
                <p class="roblox-sub">Livre no mercado</p>
            </div>

            <!-- Card Central -->
            <div class="glass-card w-full max-w-md rounded-2xl p-8 md:p-10 text-center flex flex-col items-center justify-center order-1 lg:order-2 mx-auto relative overflow-hidden">
                
                <div class="text-[#5865F2] text-7xl mb-6 filter drop-shadow-[0_4px_10px_rgba(88,101,242,0.3)]">
                    <i class="fa-brands fa-discord"></i>
                </div>

                <h2 class="text-white text-xl md:text-2xl font-semibold mb-8 max-w-xs leading-snug">
                    Entre com sua conta Discord para começar
                </h2>

                <button onclick="loginWithDiscord()" id="discord-btn" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold py-3.5 px-6 rounded-xl transition-all duration-200 flex items-center justify-center gap-3 shadow-lg shadow-[#5865F2]/20 transform hover:-translate-y-0.5 text-base">
                    <i class="fa-brands fa-discord text-2xl"></i>
                    <span id="btn-text">Entrar com Discord</span>
                    <span id="btn-loading" class="loading-spinner" style="display:none;"></span>
                </button>

                <p id="error-msg" class="text-red-400 text-xs mt-4 hidden"></p>

                <p class="text-xs text-gray-500 mt-6 tracking-wide font-medium">
                    Única forma de login <span class="mx-1.5">•</span> 100% seguro
                </p>
            </div>

            <!-- Personagem Direita - Clube -->
            <div class="flex flex-col items-center order-3 transform hover:scale-105 transition-transform duration-300">
                <div class="roblox-head club">
                    <div class="roblox-face">
                        <div class="roblox-eyes">
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
                <p class="roblox-label">Clube</p>
                <p class="roblox-sub">Buscando talentos</p>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "https://free-agents-backend.onrender.com";

        async function loginWithDiscord() {
            const btn = document.getElementById("discord-btn");
            const btnText = document.getElementById("btn-text");
            const btnLoading = document.getElementById("btn-loading");
            const errorMsg = document.getElementById("error-msg");
            
            btn.disabled = true;
            btnText.textContent = "Redirecionando...";
            btnLoading.style.display = "inline-block";
            errorMsg.classList.add("hidden");
            
            try {
                const res = await fetch(`${API_URL}/auth/discord/login`);
                const data = await res.json();
                window.location.href = data.url;
            } catch (err) {
                errorMsg.textContent = "Erro ao conectar com o servidor. Tente novamente.";
                errorMsg.classList.remove("hidden");
                btn.disabled = false;
                btnText.textContent = "Entrar com Discord";
                btnLoading.style.display = "none";
            }
        }
    </script>

</body>
</html>
