<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Agents - MPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-image: url('https://media.discordapp.net/attachments/1197353564171939982/1524591451319697469/novo.png?ex=6a504def&is=6a4efc6f&hm=1a49e3ac0672bc6830678f97a371cda25e49cc7d03f23c77f962d75ee372b4e7&=&format=webp&quality=lossless&width=1398&height=787');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Camada escura sobre a imagem */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 20, 0.25);
            z-index: 0;
        }

        /* Container principal */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Indicador online */
        .online-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff66;
            animation: dotPulse 2s infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Logo */
        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-area i {
            font-size: 3rem;
            color: #5865F2;
            margin-bottom: 8px;
            animation: bounce 3s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo-area h1 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-style: italic;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .logo-area span {
            color: #5865F2;
            display: block;
            font-size: 0.9rem;
            letter-spacing: 4px;
            font-weight: 600;
        }

        /* Card de login */
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 36px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .avatar-placeholder {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .login-card h2 {
            font-size: 1.4rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .login-card p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 24px;
        }

        .btn-discord {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #5865F2;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .btn-discord:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
        }

        .btn-discord:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .security-info {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
        }

        .official-badge {
            margin-top: 18px;
            background: rgba(88, 101, 242, 0.12);
            border: 1px solid rgba(88, 101, 242, 0.25);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a94f8;
            display: inline-block;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            padding: 16px 20px;
            z-index: 10;
            flex-wrap: wrap;
            gap: 10px;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
        }

        .footer-item i {
            color: #5865F2;
            font-size: 1rem;
        }

        .footer-item span {
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 600px) {
            .login-card {
                padding: 24px 18px;
            }
            .logo-area h1 {
                font-size: 1.5rem;
            }
            .footer {
                flex-direction: column;
                align-items: center;
                gap: 6px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Indicador Online -->
    <div class="online-counter">
        <span class="dot"></span>
        <span><strong>1287</strong> Jogadores online</span>
    </div>

    <!-- Container Principal -->
    <div class="container">
        
        <!-- Logo -->
        <div class="logo-area">
            <i class="fa-solid fa-futbol"></i>
            <h1>Free Agents</h1>
            <span>- M P S -</span>
        </div>

        <!-- Card Login -->
        <div class="login-card">
            <div class="avatar-placeholder">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2>Bem-vindo de volta!</h2>
            <p>Entre para continuar sua jornada no mundo do futebol.</p>

            <button class="btn-discord" id="discordBtn" onclick="loginWithDiscord()">
                <i class="fa-brands fa-discord"></i>
                <span id="btnText">Entrar com Discord</span>
                <span class="spinner" id="btnSpinner"></span>
            </button>

            <div class="error-msg" id="errorMsg">
                <i class="fa-solid fa-triangle-exclamation"></i> Erro ao conectar. Tente novamente.
            </div>

            <div class="security-info">
                <i class="fa-solid fa-shield-check"></i> Seguro, rápido e confiável.
            </div>
        </div>

        <div class="official-badge">
            <i class="fa-solid fa-circle-check"></i> Plataforma Oficial MPS
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-item">
            <i class="fa-solid fa-shield-heart"></i>
            <span>100% Seguro</span>
        </div>
        <div class="footer-item">
            <i class="fa-solid fa-users"></i>
            <span>Comunidade Ativa</span>
        </div>
        <div class="footer-item">
            <i class="fa-solid fa-trophy"></i>
            <span>Competições</span>
        </div>
        <div class="footer-item">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span>Atualizações</span>
        </div>
    </div>

    <script>
        const API_URL = "https://free-agents-backend.onrender.com";

        async function loginWithDiscord() {
            const btn = document.getElementById("discordBtn");
            const btnText = document.getElementById("btnText");
            const btnSpinner = document.getElementById("btnSpinner");
            const errorMsg = document.getElementById("errorMsg");
            
            btn.disabled = true;
            btnText.textContent = "Redirecionando...";
            btnSpinner.style.display = "inline-block";
            errorMsg.classList.remove("show");
            
            try {
                const res = await fetch(`${API_URL}/auth/discord/login`);
                const data = await res.json();
                window.location.href = data.url;
            } catch (err) {
                errorMsg.classList.add("show");
                btn.disabled = false;
                btnText.textContent = "Entrar com Discord";
                btnSpinner.style.display = "none";
                setTimeout(() => errorMsg.classList.remove("show"), 4000);
            }
        }
    </script>

</body>
</html>
